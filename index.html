<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>今天吃啥</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: oklch(0.976 0.004 106);
    --surface: oklch(0.99 0.003 106);
    --glass-bg: oklch(1 0 0 / 0.72);
    --glass-border: oklch(1 0 0 / 0.58);
    --text-primary: oklch(0.18 0.008 106);
    --text-secondary: oklch(0.44 0.012 106);
    --text-tertiary: oklch(0.56 0.01 106);
    --accent: oklch(0.58 0.18 22);
    --accent-soft: oklch(0.72 0.12 22);
    --danger: oklch(0.52 0.18 20);
    --shadow-sm: 0 1px 2px oklch(0 0 0 / 0.04);
    --shadow-md: 0 4px 16px oklch(0 0 0 / 0.06), 0 1px 4px oklch(0 0 0 / 0.04);
    --shadow-lg: 0 12px 40px oklch(0 0 0 / 0.08), 0 4px 12px oklch(0 0 0 / 0.04);
    --radius-sm: 12px;
    --radius-md: 20px;
    --radius-lg: 28px;
    --radius-xl: 36px;
    --font-display: "SF Pro Display", -apple-system, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    --font-body: "SF Pro Text", -apple-system, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  }

  @supports (-webkit-backdrop-filter: none) {
    :root { --has-backdrop: 1; }
  }

  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100dvh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overflow-x: hidden;
  }

  /* Ambient background orbs */
  .bg-orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.28;
    pointer-events: none;
    z-index: 0;
  }
  .bg-orb--1 {
    width: 320px; height: 320px;
    background: oklch(0.72 0.14 48);
    top: -80px; right: -60px;
    animation: orb-float 14s ease-in-out infinite;
  }
  .bg-orb--2 {
    width: 260px; height: 260px;
    background: oklch(0.68 0.12 195);
    bottom: 10%; left: -70px;
    animation: orb-float 18s ease-in-out infinite reverse;
  }
  .bg-orb--3 {
    width: 200px; height: 200px;
    background: oklch(0.74 0.16 22);
    top: 40%; left: 50%;
    animation: orb-float 16s ease-in-out infinite 4s;
  }

  @keyframes orb-float {
    0%, 100% { transform: translate(0, 0) scale(1); }
    25% { transform: translate(30px, -40px) scale(1.08); }
    50% { transform: translate(-20px, 30px) scale(0.94); }
    75% { transform: translate(-35px, -20px) scale(1.05); }
  }

  /* Phone frame */
  .phone {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 414px;
    min-height: 100dvh;
    padding: 0 20px;
    padding-top: max(60px, env(safe-area-inset-top, 20px));
    padding-bottom: max(34px, env(safe-area-inset-bottom, 20px));
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Header */
  .header {
    width: 100%;
    text-align: center;
    margin-bottom: 12px;
  }
  .header__tag {
    display: inline-block;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.04em;
    color: var(--text-tertiary);
    text-transform: uppercase;
    background: var(--glass-bg);
    backdrop-filter: blur(24px) saturate(1.6);
    -webkit-backdrop-filter: blur(24px) saturate(1.6);
    border: 1px solid var(--glass-border);
    border-radius: 100px;
    padding: 5px 16px;
    margin-bottom: 14px;
  }
  .header__title {
    font-family: var(--font-display);
    font-size: clamp(36px, 9vw, 44px);
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.1;
    color: var(--text-primary);
  }
  .header__sub {
    font-size: 15px;
    color: var(--text-tertiary);
    margin-top: 4px;
    font-weight: 400;
  }

  /* Result area */
  .result {
    width: 100%;
    min-height: 140px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 16px 0 6px;
    position: relative;
  }
  .result__card {
    width: 100%;
    background: var(--glass-bg);
    backdrop-filter: blur(40px) saturate(2);
    -webkit-backdrop-filter: blur(40px) saturate(2);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-lg);
    padding: 24px 24px;
    text-align: center;
    box-shadow: var(--shadow-md);
    transition: all 0.5s cubic-bezier(0.25, 0.1, 0.25, 1);
    transform-origin: center center;
  }
  .result__card--rolling {
    animation: card-roll 0.15s ease-in-out infinite;
  }
  .result__card--reveal {
    animation: card-pop 0.65s cubic-bezier(0.22, 0.61, 0.36, 1);
  }

  @keyframes card-roll {
    0% { transform: translateY(0); }
    50% { transform: translateY(-3px); }
    100% { transform: translateY(0); }
  }

  @keyframes card-pop {
    0% { transform: scale(0.94); filter: blur(8px); opacity: 0; }
    60% { transform: scale(1.03); filter: blur(0); opacity: 1; }
    100% { transform: scale(1); filter: blur(0); opacity: 1; }
  }

  .result__emoji {
    font-size: 56px;
    line-height: 1;
    margin-bottom: 16px;
    transition: transform 0.4s cubic-bezier(0.22, 0.61, 0.36, 1);
    display: block;
  }
  .result__card--reveal .result__emoji {
    animation: emoji-bounce 0.7s cubic-bezier(0.22, 0.61, 0.36, 1) 0.1s both;
  }
  @keyframes emoji-bounce {
    0% { transform: scale(0.3); opacity: 0; }
    50% { transform: scale(1.2); }
    100% { transform: scale(1); opacity: 1; }
  }
  .result__name {
    font-family: var(--font-display);
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.01em;
    color: var(--text-primary);
    margin-bottom: 6px;
    transition: all 0.5s cubic-bezier(0.22, 0.61, 0.36, 1);
  }
  .result__desc {
    font-size: 14px;
    color: var(--text-secondary);
    font-weight: 400;
    transition: all 0.5s cubic-bezier(0.22, 0.61, 0.36, 1);
  }
  .result__placeholder {
    color: var(--text-tertiary);
    font-size: 17px;
    font-weight: 400;
  }

  /* List section */
  .section {
    width: 100%;
    margin-top: 8px;
  }
  .section__header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    background: var(--glass-bg);
    backdrop-filter: blur(24px) saturate(1.6);
    -webkit-backdrop-filter: blur(24px) saturate(1.6);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-md);
    cursor: pointer;
    box-shadow: var(--shadow-sm);
    transition: all 0.25s cubic-bezier(0.25, 0.1, 0.25, 1);
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .section__header:active {
    transform: scale(0.985);
    background: oklch(0.96 0.003 106 / 0.85);
  }
  .section__title {
    font-family: var(--font-display);
    font-size: 16px;
    font-weight: 600;
    color: var(--text-primary);
    letter-spacing: -0.01em;
    flex: 1;
  }
  .section__count {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-tertiary);
  }
  .section__chevron {
    width: 24px; height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.3s cubic-bezier(0.25, 0.1, 0.25, 1);
    flex-shrink: 0;
  }
  .section__chevron svg {
    width: 16px; height: 16px;
    stroke: var(--text-tertiary);
    stroke-width: 2;
    fill: none;
    stroke-linecap: round;
  }
  .section--open .section__chevron {
    transform: rotate(180deg);
  }
  .section__add-btn {
    width: 30px; height: 30px;
    border-radius: 50%;
    background: oklch(0.94 0.005 106);
    border: 1px solid oklch(0.88 0.006 106);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 18px;
    color: var(--text-secondary);
    transition: all 0.2s ease;
    -webkit-tap-highlight-color: transparent;
    flex-shrink: 0;
  }
  .section__add-btn:active {
    background: oklch(0.88 0.006 106);
    transform: scale(0.92);
  }
  .section__body {
    overflow: hidden;
    max-height: 0;
    opacity: 0;
    transition: max-height 0.4s cubic-bezier(0.25, 0.1, 0.25, 1),
                opacity 0.3s cubic-bezier(0.25, 0.1, 0.25, 1),
                margin-top 0.4s cubic-bezier(0.25, 0.1, 0.25, 1);
    margin-top: 0;
  }
  .section--open .section__body {
    max-height: 600px;
    opacity: 1;
    margin-top: 10px;
  }

  /* Tag cloud */
  .tag-cloud {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 4px 0;
  }
  .tag {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 14px;
    font-weight: 500;
    padding: 8px 14px;
    border-radius: 100px;
    background: var(--glass-bg);
    backdrop-filter: blur(20px) saturate(1.4);
    -webkit-backdrop-filter: blur(20px) saturate(1.4);
    border: 1px solid var(--glass-border);
    color: var(--text-primary);
    box-shadow: var(--shadow-sm);
    transition: all 0.25s cubic-bezier(0.25, 0.1, 0.25, 1);
    cursor: default;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .tag__emoji { font-size: 15px; line-height: 1; }
  .tag__remove {
    width: 18px; height: 18px;
    border-radius: 50%;
    background: oklch(0.9 0.008 106);
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 11px;
    color: var(--text-tertiary);
    margin-left: 2px;
    transition: all 0.2s ease;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
  }
  .tag__remove:active { background: oklch(0.82 0.01 20); color: var(--danger); }
  .tag--highlight {
    background: var(--accent);
    color: #fff;
    border-color: transparent;
    box-shadow: 0 4px 16px oklch(0.58 0.18 22 / 0.3);
    animation: tag-glow 0.5s cubic-bezier(0.22, 0.61, 0.36, 1);
  }
  @keyframes tag-glow {
    0% { box-shadow: 0 0 0 0 oklch(0.58 0.18 22 / 0.5); }
    100% { box-shadow: 0 4px 24px oklch(0.58 0.18 22 / 0.25); }
  }

  /* CTA button */
  .cta-wrap {
    width: 100%;
    padding: 14px 0 4px;
    display: flex;
    justify-content: center;
  }
  .cta {
    width: 100%;
    max-width: 320px;
    height: 56px;
    border-radius: 100px;
    background: var(--accent);
    border: none;
    color: #fff;
    font-family: var(--font-display);
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 0.02em;
    cursor: pointer;
    box-shadow: 0 8px 32px oklch(0.58 0.18 22 / 0.3), 0 2px 8px oklch(0.58 0.18 22 / 0.15);
    transition: all 0.25s cubic-bezier(0.25, 0.1, 0.25, 1);
    animation: breathe 3s ease-in-out infinite;
    -webkit-tap-highlight-color: transparent;
    position: relative;
    overflow: hidden;
  }
  .cta::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 100px;
    background: linear-gradient(135deg, oklch(1 0 0 / 0.15) 0%, transparent 50%);
    pointer-events: none;
  }
  .cta:active {
    transform: scale(0.96);
    box-shadow: 0 4px 16px oklch(0.58 0.18 22 / 0.2);
    animation: none;
  }
  .cta:active::after { opacity: 0; }
  @keyframes breathe {
    0%, 100% { box-shadow: 0 8px 32px oklch(0.58 0.18 22 / 0.3), 0 2px 8px oklch(0.58 0.18 22 / 0.15); }
    50% { box-shadow: 0 12px 40px oklch(0.58 0.18 22 / 0.4), 0 4px 12px oklch(0.58 0.18 22 / 0.2); }
  }

  /* Modal overlay */
  .modal-overlay {
    position: fixed;
    inset: 0;
    backdrop-filter: blur(12px) saturate(1.2);
    -webkit-backdrop-filter: blur(12px) saturate(1.2);
    background: oklch(0 0 0 / 0.2);
    display: flex;
    align-items: flex-end;
    justify-content: center;
    z-index: 100;
    padding: 20px;
    padding-bottom: max(34px, env(safe-area-inset-bottom, 20px));
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s cubic-bezier(0.25, 0.1, 0.25, 1);
  }
  .modal-overlay--show {
    opacity: 1;
    pointer-events: auto;
  }
  .modal {
    width: 100%;
    max-width: 374px;
    background: var(--surface);
    border-radius: var(--radius-xl);
    padding: 28px 24px 24px;
    box-shadow: var(--shadow-lg), 0 0 0 1px oklch(1 0 0 / 0.5);
    transform: translateY(20px);
    transition: transform 0.35s cubic-bezier(0.22, 0.61, 0.36, 1);
  }
  .modal-overlay--show .modal {
    transform: translateY(0);
  }
  .modal__title {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 20px;
    text-align: center;
    letter-spacing: -0.01em;
  }
  .modal__input {
    width: 100%;
    height: 48px;
    border-radius: var(--radius-sm);
    border: 1px solid oklch(0.88 0.006 106);
    background: oklch(0.97 0.003 106);
    padding: 0 16px;
    font-size: 16px;
    font-family: var(--font-body);
    color: var(--text-primary);
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 8px;
  }
  .modal__input:focus {
    border-color: var(--accent-soft);
    background: #fff;
  }
  .modal__hint {
    font-size: 12px;
    color: var(--text-tertiary);
    margin-bottom: 20px;
    padding-left: 4px;
  }
  .modal__actions {
    display: flex;
    gap: 10px;
  }
  .modal__btn {
    flex: 1;
    height: 46px;
    border-radius: 100px;
    border: none;
    font-size: 16px;
    font-weight: 600;
    font-family: var(--font-body);
    cursor: pointer;
    transition: all 0.2s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .modal__btn--cancel {
    background: oklch(0.94 0.005 106);
    color: var(--text-secondary);
  }
  .modal__btn--confirm {
    background: var(--accent);
    color: #fff;
  }
  .modal__btn:active { transform: scale(0.96); }

  /* Toast */
  .toast {
    position: fixed;
    top: max(60px, env(safe-area-inset-top, 20px));
    left: 50%;
    transform: translateX(-50%) translateY(-120px);
    background: oklch(0.25 0.01 106);
    color: #fff;
    font-size: 14px;
    font-weight: 500;
    padding: 10px 22px;
    border-radius: 100px;
    z-index: 200;
    pointer-events: none;
    transition: transform 0.35s cubic-bezier(0.22, 0.61, 0.36, 1);
    box-shadow: var(--shadow-md);
  }
  .toast--show {
    transform: translateX(-50%) translateY(0);
  }

  /* History dots */
  .history {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 12px;
    min-height: 24px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .history__label {
    font-size: 12px;
    color: var(--text-tertiary);
    margin-right: 4px;
  }
  .history__dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent-soft);
    opacity: 0.5;
    animation: dot-in 0.4s cubic-bezier(0.22, 0.61, 0.36, 1) both;
  }
  @keyframes dot-in {
    from { transform: scale(0); opacity: 0; }
    to { transform: scale(1); opacity: 0.5; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
  }
</style>
</head>
<body>

<div class="bg-orb bg-orb--1" aria-hidden="true"></div>
<div class="bg-orb bg-orb--2" aria-hidden="true"></div>
<div class="bg-orb bg-orb--3" aria-hidden="true"></div>

<div class="phone" id="app">
  <header class="header">
    <div class="header__tag">FOOD PICKER</div>
    <h1 class="header__title">今天吃啥</h1>
    <p class="header__sub">把选择交给运气</p>
  </header>

  <div class="result" id="resultArea">
    <div class="result__card" id="resultCard">
      <span class="result__placeholder" id="placeholder">点击下方按钮<br>随机抽取一道菜</span>
      <span class="result__emoji" id="resultEmoji" style="display:none"></span>
      <div class="result__name" id="resultName" style="display:none"></div>
      <div class="result__desc" id="resultDesc" style="display:none"></div>
    </div>
  </div>

  <div class="section" id="section">
    <div class="section__header" id="sectionHeader">
      <span class="section__title">菜品池</span>
      <span class="section__count" id="dishCount">0 道</span>
      <button class="section__add-btn" id="addBtn" aria-label="添加菜品">+</button>
      <div class="section__chevron"><svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg></div>
    </div>
    <div class="section__body">
      <div class="tag-cloud" id="tagCloud"></div>
    </div>
  </div>

  <div class="history" id="history">
    <span class="history__label">历史</span>
  </div>

  <div class="cta-wrap">
    <button class="cta" id="rollBtn">今天吃啥</button>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal__title">添加菜品</div>
    <input class="modal__input" id="modalInput" type="text" placeholder="输入菜名，如：红烧排骨" maxlength="20" autocomplete="off">
    <div class="modal__hint">系统会自动匹配 emoji，你也可以手动输入 emoji 加在最后</div>
    <div class="modal__actions">
      <button class="modal__btn modal__btn--cancel" id="modalCancel">取消</button>
      <button class="modal__btn modal__btn--confirm" id="modalConfirm">添加</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function() {
  'use strict';

  // --- Constants ---
  const CATEGORY_EMOJI = {
    '面': '🍜', '粉': '🍜', '饭': '🍚', '煲': '🍲', '锅': '🍲',
    '鱼': '🐟', '虾': '🦐', '蟹': '🦀', '鸡': '🍗', '鸭': '🦆',
    '牛': '🥩', '猪': '🥩', '羊': '🐑', '排': '🥩', '肉': '🥩',
    '菜': '🥬', '汤': '🥣', '粥': '🥣', '饼': '🫓', '包': '🥟',
    '饺': '🥟', '蛋': '🥚', '奶': '🧋', '茶': '🧋', '咖': '☕',
    '堡': '🍔', '披': '🍕', '薯': '🍟', '卷': '🌯', '串': '🍢',
    '烤': '🍖', '炸': '🍤', '炒': '🍳', '蒸': '🥟', '煮': '🍲',
    '凉': '🥗', '沙': '🥗', '甜': '🍰', '冰': '🍧', '米': '🍚',
    '豆腐': '🫘', '寿司': '🍣', '麻': '🌶️', '辣': '🌶️',
    '火': '🔥', '烧': '🔥', '焗': '🧀', '芝士': '🧀',
    '海鲜': '🦞', '生蚝': '🦪', '扇': '🦪', '蛤': '🦪',
    '皮皮虾': '🦐', '鱿鱼': '🦑', '墨鱼': '🦑',
    '沙拉': '🥗', '牛油果': '🥑', '三明治': '🥪',
    '馄饨': '🥟', '抄手': '🥟', '云吞': '🥟', '肠粉': '🥢',
    '年糕': '🍡', '团': '🍡', '圆': '🍡',
    '酒': '🍺', '啤': '🍺', '可': '🥤', '椰': '🥥',
    '芒': '🥭', '柠': '🍋', '冰激': '🍦', '酸': '🥛',
    '汤圆': '🍡',
  };

  const DEFAULT_DISHES = [
    // 川湘菜
    '红烧排骨', '酸菜鱼', '水煮肉片', '宫保鸡丁', '麻辣香锅',

  function getEmoji(name) {
    // Check if name ends with an emoji manually typed
    const last = name.slice(-2);
    if (/[\u{1F000}-\u{1FFFF}]/u.test(last) || /[\u{2600}-\u{27BF}]/u.test(last) || /[\u{FE00}-\u{FEFF}]/u.test(last)) {
      return last.match(/[\u{1F000}-\u{1FFFF}\u{2600}-\u{27BF}\u{FE00}-\u{FEFF}]/gu)?.slice(-1)[0] || '';
    }
    for (const [key, emoji] of Object.entries(CATEGORY_EMOJI)) {
      if (name.includes(key)) return emoji;
    }
    return '🍽️';
  }

    return map[name] || '随机之选，值得一试';
  }

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  // --- Persistent storage ---
  function load() {
    try {
      const raw = localStorage.getItem('eat-today-dishes');
      if (raw) {
        dishes = JSON.parse(raw);
        if (!Array.isArray(dishes) || dishes.length === 0) throw new Error('empty');
      } else {
        dishes = [...DEFAULT_DISHES];
      }
    } catch {
      dishes = [...DEFAULT_DISHES];
    }
    try {
      const rawH = localStorage.getItem('eat-today-history');
      if (rawH) history = JSON.parse(rawH);
    } catch {
      history = [];
    }
  }

  function save() {
    try { localStorage.setItem('eat-today-dishes', JSON.stringify(dishes)); } catch {}
    try { localStorage.setItem('eat-today-history', JSON.stringify(history)); } catch {}
  }

  // --- Render ---
  function renderTags(highlightName) {
    tagCloud.innerHTML = '';
    dishes.forEach((name) => {
      const tag = document.createElement('span');
      tag.className = 'tag';
      if (highlightName && name === highlightName) tag.classList.add('tag--highlight');

      const emojiSpan = document.createElement('span');
      emojiSpan.className = 'tag__emoji';
      emojiSpan.textContent = getEmoji(name);

      const textNode = document.createTextNode(name);

      const removeBtn = document.createElement('button');
      removeBtn.className = 'tag__remove';
      removeBtn.innerHTML = '&#x2715;';
      removeBtn.setAttribute('aria-label', '删除 ' + name);
      removeBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        removeDish(name);
      });

      tag.appendChild(emojiSpan);
      tag.appendChild(textNode);
      tag.appendChild(removeBtn);
      tagCloud.appendChild(tag);
    });
    dishCount.textContent = dishes.length + ' 道';
  }

  function renderHistory() {
    // Keep the label
    historyEl.querySelectorAll('.history__dot').forEach(el => el.remove());
    const limit = Math.min(history.length, HISTORY_MAX);
    for (let i = 0; i < limit; i++) {
      const dot = document.createElement('span');
      dot.className = 'history__dot';
      historyEl.appendChild(dot);
    }
  }

  function showResult(name, animate) {
    const emoji = getEmoji(name);
    const desc = getDesc(name);

    placeholder.style.display = 'none';
    resultEmoji.style.display = 'block';
    resultName.style.display = 'block';
    resultDesc.style.display = 'block';

    resultEmoji.textContent = emoji;
    resultName.textContent = name;
    resultDesc.textContent = desc;

    if (animate) {
      resultCard.classList.remove('result__card--rolling', 'result__card--reveal');
      void resultCard.offsetWidth;
      resultCard.classList.add('result__card--reveal');
    }
  }

  function resetResult() {
    resultCard.classList.remove('result__card--rolling', 'result__card--reveal');
    placeholder.style.display = '';
    resultEmoji.style.display = 'none';
    resultName.style.display = 'none';
    resultDesc.style.display = 'none';
  }

  // --- Actions ---
  function toggleSection() {
    sectionOpen = !sectionOpen;
    if (sectionOpen) {
      sectionEl.classList.add('section--open');
    } else {
      sectionEl.classList.remove('section--open');
    }
  }

  function roll() {
    if (isRolling) return;
    if (dishes.length === 0) {
      showToast('菜品池空了，先添加几道菜吧');
      return;
    }
    isRolling = true;
    rollBtn.style.pointerEvents = 'none';

    // Remove previous highlight
    resultCard.classList.remove('result__card--reveal');
    resultCard.classList.add('result__card--rolling');
    renderTags(null);

    // Simulate rolling through random dishes
    const duration = 1200;
    const interval = 60;
    let elapsed = 0;
    let lastIdx = -1;
    const rollInterval = setInterval(() => {
      let idx;
      do { idx = Math.floor(Math.random() * dishes.length); } while (idx === lastIdx && dishes.length > 1);
      lastIdx = idx;
      showResult(dishes[idx], false);
      elapsed += interval;
      if (elapsed >= duration) {
        clearInterval(rollInterval);
        finalizeRoll();
      }
    }, interval);
  }

  function finalizeRoll() {
    const chosenIdx = Math.floor(Math.random() * dishes.length);
    const chosen = dishes[chosenIdx];

    resultCard.classList.remove('result__card--rolling');
    showResult(chosen, true);
    renderTags(chosen);
    history.unshift(chosen);
    if (history.length > HISTORY_MAX) history.length = HISTORY_MAX;
    renderHistory();
    save();

    isRolling = false;
    rollBtn.style.pointerEvents = '';
  }

  function addDish(name) {
    const trimmed = name.trim();
    if (!trimmed) return;
    if (dishes.includes(trimmed)) {
      showToast('这道菜已经在菜品池中了');
      return;
    }
    dishes.push(trimmed);
    save();
    renderTags();
  }

  function removeDish(name) {
    if (dishes.length <= 1) {
      showToast('至少保留一道菜哦');
      return;
    }
    dishes = dishes.filter(d => d !== name);
    save();
    renderTags();
    showToast('已删除「' + name + '」');
  }

  // --- Modal ---
  function openModal() {
    modalOverlay.classList.add('modal-overlay--show');
    modalInput.value = '';
    modalInput.focus();
  }

  function closeModal() {
    modalOverlay.classList.remove('modal-overlay--show');
    modalInput.blur();
  }

  function confirmAdd() {
    const name = modalInput.value.trim();
    if (!name) {
      showToast('请输入菜名');
      modalInput.focus();
      return;
    }
    addDish(name);
    closeModal();
    showToast('已添加「' + name + '」');
  }

  // --- Toast ---
  let toastTimer;
  function showToast(msg) {
    if (toastTimer) clearTimeout(toastTimer);
    toast.textContent = msg;
    toast.classList.add('toast--show');
    toastTimer = setTimeout(() => {
      toast.classList.remove('toast--show');
    }, 1800);
  }

  // --- Events ---
  sectionHeader.addEventListener('click', (e) => {
    if (e.target.closest('#addBtn')) return;
    toggleSection();
  });
  addBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    openModal();
  });
  rollBtn.addEventListener('click', roll);
  modalCancel.addEventListener('click', closeModal);
  modalConfirm.addEventListener('click', confirmAdd);
  modalOverlay.addEventListener('click', (e) => {
    if (e.target === modalOverlay) closeModal();
  });
  modalInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') confirmAdd();
    if (e.key === 'Escape') closeModal();
  });

  // Swipe down on result to reset
  let touchStartY = 0;
  resultCard.addEventListener('touchstart', (e) => {
    touchStartY = e.touches[0].clientY;
  });
  resultCard.addEventListener('touchend', (e) => {
    const dy = e.changedTouches[0].clientY - touchStartY;
    if (dy > 60 && !isRolling) {
      resetResult();
      renderTags(null);
    }
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === ' ' && document.activeElement === document.body) {
      e.preventDefault();
      roll();
    }
    if (e.key === '+' && document.activeElement === document.body && !modalOverlay.classList.contains('modal-overlay--show')) {
      e.preventDefault();
      openModal();
    }
  });

  // --- Init ---
  load();
  renderTags();
  renderHistory();
})();
</script>
