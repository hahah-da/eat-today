<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>今天吃啥 · 抽卡</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-deep: #0a0a14;
  --bg-card: rgba(20, 20, 40, 0.85);
  --bg-card-hover: rgba(30, 30, 55, 0.9);
  --border-card: rgba(255, 255, 255, 0.06);
  --text-primary: #e8e6f0;
  --text-secondary: #9a97b0;
  --text-tertiary: #5e5b78;
  --accent: #ff6b35;
  --accent-glow: rgba(255, 107, 53, 0.4);
  --gold: #f0c060;
  --gold-glow: rgba(240, 192, 96, 0.5);
  --purple: #b57bee;
  --purple-glow: rgba(181, 123, 238, 0.5);
  --blue: #5b9cf5;
  --blue-glow: rgba(91, 156, 245, 0.4);
  --green: #4ecdc4;
  --danger: #ff4757;
  --radius-sm: 10px;
  --radius-md: 16px;
  --radius-lg: 24px;
  --radius-xl: 32px;
  --font-display: "SF Pro Display", -apple-system, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  --font-body: "SF Pro Text", -apple-system, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
}

body {
  font-family: var(--font-body);
  background: var(--bg-deep);
  color: var(--text-primary);
  min-height: 100dvh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
  position: relative;
}

/* Particle canvas background */
#particleCanvas {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

/* Ambient glow orbs */
.glow-orb {
  position: fixed;
  border-radius: 50%;
  filter: blur(100px);
  opacity: 0.15;
  pointer-events: none;
  z-index: 0;
}
.glow-orb--1 {
  width: 400px; height: 400px;
  background: radial-gradient(circle, #b57bee 0%, transparent 70%);
  top: -100px; right: -80px;
  animation: orb-drift 20s ease-in-out infinite;
}
.glow-orb--2 {
  width: 350px; height: 350px;
  background: radial-gradient(circle, #ff6b35 0%, transparent 70%);
  bottom: 5%; left: -100px;
  animation: orb-drift 24s ease-in-out infinite reverse;
}
.glow-orb--3 {
  width: 280px; height: 280px;
  background: radial-gradient(circle, #f0c060 0%, transparent 70%);
  top: 35%; left: 45%;
  animation: orb-drift 18s ease-in-out infinite 6s;
}
@keyframes orb-drift {
  0%, 100% { transform: translate(0, 0) scale(1); }
  25% { transform: translate(40px, -50px) scale(1.1); }
  50% { transform: translate(-30px, 20px) scale(0.9); }
  75% { transform: translate(-50px, -30px) scale(1.05); }
}

/* Phone frame */
.phone {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 414px;
  min-height: 100dvh;
  padding: 0 20px;
  padding-top: max(60px, env(safe-area-inset-top, 20px));
  padding-bottom: max(40px, env(safe-area-inset-bottom, 20px));
  display: flex;
  flex-direction: column;
  align-items: center;
  animation: phone-enter 0.8s cubic-bezier(0.22, 0.61, 0.36, 1);
}
@keyframes phone-enter {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Header */
.header {
  width: 100%;
  text-align: center;
  margin-bottom: 8px;
}
.header__tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.15em;
  color: var(--gold);
  text-transform: uppercase;
  background: rgba(240, 192, 96, 0.08);
  border: 1px solid rgba(240, 192, 96, 0.2);
  border-radius: 100px;
  padding: 6px 18px;
  margin-bottom: 12px;
}
.header__tag::before {
  content: '◆';
  font-size: 8px;
  animation: gem-pulse 2s ease-in-out infinite;
}
@keyframes gem-pulse {
  0%, 100% { opacity: 0.4; }
  50% { opacity: 1; }
}
.header__title {
  font-family: var(--font-display);
  font-size: clamp(38px, 10vw, 48px);
  font-weight: 800;
  letter-spacing: -0.03em;
  line-height: 1.1;
  background: linear-gradient(135deg, #f0c060 0%, #ff6b35 50%, #f0c060 100%);
  background-size: 200% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: title-shimmer 3s linear infinite;
}
@keyframes title-shimmer {
  to { background-position: 200% center; }
}
.header__sub {
  font-size: 14px;
  color: var(--text-tertiary);
  margin-top: 2px;
  font-weight: 400;
  letter-spacing: 0.05em;
}

/* Result area - the card display */
.result {
  width: 100%;
  min-height: 200px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  margin: 18px 0 8px;
  perspective: 1000px;
}
.result__wrapper {
  width: 100%;
  max-width: 340px;
  position: relative;
  margin: 0 auto;
}
.result__card {
  width: 100%;
  min-height: 160px;
  background: var(--bg-card);
  backdrop-filter: blur(40px) saturate(1.8);
  -webkit-backdrop-filter: blur(40px) saturate(1.8);
  border: 1px solid var(--border-card);
  border-radius: var(--radius-lg);
  padding: 32px 24px;
  text-align: center;
  position: relative;
  overflow: hidden;
  transition: all 0.6s cubic-bezier(0.22, 0.61, 0.36, 1);
  transform-style: preserve-3d;
}
/* Rarity border glow overlay */
.result__card::before {
  content: '';
  position: absolute;
  inset: -2px;
  border-radius: calc(var(--radius-lg) + 2px);
  padding: 2px;
  background: linear-gradient(135deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  pointer-events: none;
  z-index: 1;
}
.result__card--N::before {
  background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.02));
}
.result__card--R::before {
  background: linear-gradient(135deg, var(--blue), rgba(91,156,245,0.2), var(--blue));
  animation: border-shimmer 2s ease-in-out infinite;
}
.result__card--SR::before {
  background: linear-gradient(135deg, var(--purple), rgba(181,123,238,0.2), var(--purple));
  animation: border-shimmer 1.5s ease-in-out infinite;
}
.result__card--SSR::before {
  background: linear-gradient(135deg, var(--gold), #fff, var(--gold));
  animation: border-shimmer 1s ease-in-out infinite;
}
@keyframes border-shimmer {
  0%, 100% { opacity: 0.6; }
  50% { opacity: 1; }
}

/* Card inner shimmer effect */
.result__card::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(105deg, transparent 40%, rgba(255,255,255,0.03) 45%, rgba(255,255,255,0.06) 50%, rgba(255,255,255,0.03) 55%, transparent 60%);
  background-size: 200% 100%;
  pointer-events: none;
  z-index: 0;
}
.result__card--SR::after, .result__card--SSR::after {
  animation: foil-sweep 3s ease-in-out infinite;
}
@keyframes foil-sweep {
  0%, 100% { background-position: 200% 0; }
  50% { background-position: -200% 0; }
}
.result__bg-img {
  display: none;
  position: absolute;
  inset: 0;
  border-radius: var(--radius-lg);
  object-fit: cover;
  width: 100%;
  height: 100%;
  opacity: 0.2;
  z-index: 0;
  pointer-events: none;
}

.result__card--rolling {
  animation: card-shake 0.12s ease-in-out infinite;
}
.result__card--reveal {
  animation: card-reveal 0.7s cubic-bezier(0.22, 0.61, 0.36, 1);
}
@keyframes card-shake {
  0%, 100% { transform: translateY(0) rotateX(0); }
  25% { transform: translateY(-4px) rotateX(3deg); }
  75% { transform: translateY(2px) rotateX(-2deg); }
}
@keyframes card-reveal {
  0% { transform: scale(0.92) rotateY(10deg); filter: brightness(2); }
  50% { transform: scale(1.04) rotateY(-3deg); filter: brightness(1.2); }
  100% { transform: scale(1) rotateY(0); filter: brightness(1); }
}

.result__rarity {
  position: absolute;
  top: 12px;
  right: 16px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.1em;
  padding: 3px 10px;
  border-radius: 100px;
  z-index: 2;
  opacity: 0;
  transform: translateY(-8px);
  transition: all 0.5s cubic-bezier(0.22, 0.61, 0.36, 1) 0.2s;
}
.result__card--reveal .result__rarity { opacity: 1; transform: translateY(0); }
.result__rarity--SSR { background: linear-gradient(135deg, #f0c060, #ff8c00); color: #1a1a2e; }
.result__rarity--SR { background: linear-gradient(135deg, #b57bee, #7c3aed); color: #fff; }
.result__rarity--R { background: linear-gradient(135deg, #5b9cf5, #3b82f6); color: #fff; }
.result__rarity--N { background: rgba(255,255,255,0.08); color: var(--text-tertiary); }

.result__image-wrap {
  width: 100px;
  height: 100px;
  margin: 0 auto 14px;
  border-radius: var(--radius-md);
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 52px;
  position: relative;
  z-index: 1;
  overflow: hidden;
}
.result__card--reveal .result__image-wrap {
  animation: icon-reveal 0.6s cubic-bezier(0.22, 0.61, 0.36, 1) 0.1s both;
}
@keyframes icon-reveal {
  0% { transform: scale(0.3) rotate(-15deg); opacity: 0; }
  60% { transform: scale(1.15) rotate(3deg); }
  100% { transform: scale(1) rotate(0); opacity: 1; }
}

.result__name {
  font-family: var(--font-display);
  font-size: 26px;
  font-weight: 700;
  letter-spacing: -0.01em;
  position: relative;
  z-index: 1;
  transition: all 0.5s cubic-bezier(0.22, 0.61, 0.36, 1);
}
.result__card--SSR .result__name {
  color: var(--gold);
  text-shadow: 0 0 20px var(--gold-glow);
}
.result__card--SR .result__name {
  color: var(--purple);
  text-shadow: 0 0 16px var(--purple-glow);
}

.result__desc {
  font-size: 13px;
  color: var(--text-secondary);
  margin-top: 4px;
  position: relative;
  z-index: 1;
  transition: all 0.5s cubic-bezier(0.22, 0.61, 0.36, 1);
}
.result__placeholder {
  color: var(--text-secondary);
  font-size: 14px;
  font-weight: 500;
  letter-spacing: 0.05em;
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  animation: placeholder-pulse 2.5s ease-in-out infinite;
}
.placeholder__icon {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: rgba(255,107,53,0.1);
  border: 1.5px dashed rgba(255,107,53,0.25);
  position: relative;
}
.placeholder__icon::before,
.placeholder__icon::after {
  content: '';
  position: absolute;
  background: rgba(255,107,53,0.5);
  border-radius: 2px;
}
.placeholder__icon::before {
  width: 2px;
  height: 12px;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}
.placeholder__icon::after {
  width: 12px;
  height: 2px;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}
@keyframes placeholder-pulse {
  0%, 100% { opacity: 0.55; }
  50% { opacity: 0.9; }
}

/* Spark burst overlay */
.spark-burst {
  position: absolute;
  pointer-events: none;
  z-index: 3;
}
.spark-particle {
  position: absolute;
  width: 4px; height: 4px;
  border-radius: 50%;
  animation: spark-fly 0.8s cubic-bezier(0, 0.7, 0.3, 1) both;
}
@keyframes spark-fly {
  0% { transform: translate(0, 0) scale(1); opacity: 1; }
  100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; }
}

/* Rarity glow on reveal */
.rarity-glow {
  position: absolute;
  inset: -30px;
  border-radius: 60px;
  pointer-events: none;
  z-index: 0;
  opacity: 0;
  transition: opacity 0.6s;
}
.rarity-glow--show { opacity: 1; }
.rarity-glow--SSR { background: radial-gradient(ellipse at center, rgba(240,192,96,0.3) 0%, transparent 70%); }
.rarity-glow--SR { background: radial-gradient(ellipse at center, rgba(181,123,238,0.25) 0%, transparent 70%); }
.rarity-glow--R { background: radial-gradient(ellipse at center, rgba(91,156,245,0.2) 0%, transparent 70%); }

/* Filter pills - crystal style */
.filters {
  width: 100%;
  margin-top: 8px;
  position: relative;
}
.filters__scroll {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding: 4px 4px 10px;
  scroll-behavior: smooth;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  mask-image: linear-gradient(to right, transparent 0%, black 6%, black 94%, transparent 100%);
  -webkit-mask-image: linear-gradient(to right, transparent 0%, black 6%, black 94%, transparent 100%);
}
.filters__scroll::-webkit-scrollbar { display: none; }
.filter-btn {
  flex-shrink: 0;
  font-size: 13px;
  font-weight: 600;
  padding: 9px 18px;
  border-radius: 100px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.25, 0.1, 0.25, 1);
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  white-space: nowrap;
  position: relative;
  overflow: hidden;
}
.filter-btn::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 100px;
  opacity: 0;
  transition: opacity 0.3s;
}
.filter-btn:hover, .filter-btn:active {
  background: rgba(255,255,255,0.07);
  border-color: rgba(255,255,255,0.15);
}
.filter-btn--active {
  background: rgba(255,107,53,0.15);
  border-color: rgba(255,107,53,0.4);
  color: var(--accent);
  box-shadow: 0 0 20px rgba(255,107,53,0.15);
}

/* Dish pool section */
.section {
  width: 100%;
  margin-top: 6px;
}
.section__header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 18px;
  background: var(--bg-card);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border: 1px solid var(--border-card);
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.25, 0.1, 0.25, 1);
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}
.section__header:active {
  transform: scale(0.985);
  background: var(--bg-card-hover);
}
.section__title {
  font-family: var(--font-display);
  font-size: 15px;
  font-weight: 600;
  flex: 1;
}
.section__count {
  font-size: 12px;
  color: var(--text-tertiary);
  background: rgba(255,255,255,0.04);
  padding: 4px 10px;
  border-radius: 100px;
}
.section__add-btn {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: rgba(255,107,53,0.1);
  border: 1px solid rgba(255,107,53,0.25);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 18px;
  color: var(--accent);
  transition: all 0.2s ease;
  -webkit-tap-highlight-color: transparent;
  flex-shrink: 0;
}
.section__add-btn:active {
  background: rgba(255,107,53,0.2);
  transform: scale(0.9);
}
.section__chevron {
  width: 24px; height: 24px;
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.3s cubic-bezier(0.25, 0.1, 0.25, 1);
  flex-shrink: 0;
}
.section__chevron svg { width: 16px; height: 16px; stroke: var(--text-tertiary); stroke-width: 2; fill: none; stroke-linecap: round; }
.section--open .section__chevron { transform: rotate(180deg); }
.section__body {
  overflow: hidden;
  max-height: 0;
  opacity: 0;
  transition: max-height 0.4s cubic-bezier(0.25, 0.1, 0.25, 1), opacity 0.3s, margin-top 0.4s;
  margin-top: 0;
}
.section--open .section__body { max-height: 600px; opacity: 1; margin-top: 10px; }

/* Tag cloud cards */
.tag-cloud {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  padding: 4px 0;
}
.tag {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 13px;
  font-weight: 500;
  padding: 8px 13px;
  border-radius: 100px;
  background: var(--bg-card);
  border: 1px solid var(--border-card);
  color: var(--text-primary);
  transition: all 0.25s cubic-bezier(0.25, 0.1, 0.25, 1);
  cursor: default;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}
.tag__emoji { font-size: 15px; line-height: 1; }
.tag__remove {
  width: 20px; height: 20px;
  border-radius: 50%;
  background: rgba(255,255,255,0.05);
  border: none;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  font-size: 10px;
  color: var(--text-tertiary);
  margin-left: 2px;
  transition: all 0.2s;
  flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
}
.tag__remove:active { background: rgba(255,71,87,0.2); color: var(--danger); }
.tag__fav {
  width: 20px; height: 20px;
  border-radius: 50%;
  background: none; border: none;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  font-size: 12px;
  color: var(--text-tertiary);
  margin-right: -2px;
  transition: all 0.2s;
  flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
  order: -1;
}
.tag__fav--active { color: var(--gold); }
.tag__hide {
  width: 20px; height: 20px;
  border-radius: 50%;
  background: none; border: none;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  font-size: 11px;
  color: var(--text-tertiary);
  margin-right: 2px;
  transition: all 0.2s;
  flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
  order: -1;
}
.tag__hide--active { color: #5b9cf5; }
.tag--hidden { opacity: 0.3; }
.tag--fav { border-color: rgba(240,192,96,0.25); }
.tag--highlight {
  background: rgba(255,107,53,0.15);
  border-color: rgba(255,107,53,0.5);
  box-shadow: 0 0 20px rgba(255,107,53,0.2);
  animation: tag-pulse 0.5s cubic-bezier(0.22, 0.61, 0.36, 1);
}
@keyframes tag-pulse {
  0% { box-shadow: 0 0 0 0 rgba(255,107,53,0.5); }
  100% { box-shadow: 0 0 24px rgba(255,107,53,0.2); }
}

/* Combo result - gacha multi-pull */
.combo-result {
  display: flex;
  flex-direction: row;
  justify-content: center;
  gap: 10px;
  margin-top: 16px;
  width: 100%;
  position: relative;
}
.combo-result::before {
  content: '';
  position: absolute;
  top: 50%;
  left: 8%;
  right: 8%;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(240,192,96,0.3), transparent);
  z-index: 0;
  animation: combo-line-pulse 2s ease-in-out infinite;
}
@keyframes combo-line-pulse {
  0%, 100% { opacity: 0.3; }
  50% { opacity: 0.7; }
}
.combo-item {
  flex: 0 1 160px;
  max-width: 180px;
  min-width: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  gap: 10px;
  padding: 18px 6px 14px;
  background: var(--bg-card);
  backdrop-filter: blur(30px);
  -webkit-backdrop-filter: blur(30px);
  border-radius: var(--radius-lg);
  position: relative;
  overflow: hidden;
  z-index: 1;
  animation: combo-item-in 0.5s cubic-bezier(0.22, 0.61, 0.36, 1) both;
}
.combo-item:nth-child(1) { animation-delay: 0.1s; }
.combo-item:nth-child(2) { animation-delay: 0.2s; }
.combo-item:nth-child(3) { animation-delay: 0.3s; }
@keyframes combo-item-in {
  from { opacity: 0; transform: translateY(20px) scale(0.9); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
.combo-item::before {
  content: '';
  position: absolute;
  left: 0; right: 0; top: 0;
  height: 3px;
}
.combo-item--main {
  border: 1px solid rgba(255,107,53,0.3);
  box-shadow: 0 0 20px rgba(255,107,53,0.1);
}
.combo-item--main::before { background: linear-gradient(90deg, #ff6b35, #ff8c5a, #ff6b35); }
.combo-item--side {
  border: 1px solid rgba(78, 205, 196, 0.3);
  box-shadow: 0 0 20px rgba(78,205,196,0.1);
}
.combo-item--side::before { background: linear-gradient(90deg, #4ecdc4, #6ee7de, #4ecdc4); }
.combo-item--drink {
  border: 1px solid rgba(181,123,238,0.3);
  box-shadow: 0 0 20px rgba(181,123,238,0.1);
}
.combo-item--drink::before { background: linear-gradient(90deg, #b57bee, #c99df2, #b57bee); }
.combo-item__icon {
  width: 52px; height: 52px;
  border-radius: var(--radius-md);
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  display: flex; align-items: center; justify-content: center;
  font-size: 28px;
  flex-shrink: 0;
}
.combo-item__content {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.combo-item__type {
  font-size: 10px;
  font-weight: 700;
  color: var(--text-tertiary);
  text-transform: uppercase;
  letter-spacing: 0.12em;
}
.combo-item__name {
  font-family: var(--font-display);
  font-size: 16px;
  font-weight: 600;
  color: var(--text-primary);
  line-height: 1.3;
  letter-spacing: -0.01em;
}

/* CTA buttons */
.cta-wrap {
  width: 100%;
  padding: 14px 0 4px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}
.cta {
  width: 100%;
  max-width: 320px;
  height: 58px;
  border-radius: 100px;
  background: linear-gradient(135deg, #ff6b35, #ff4500);
  border: none;
  color: #fff;
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 700;
  letter-spacing: 0.06em;
  cursor: pointer;
  box-shadow: 0 8px 32px rgba(255,107,53,0.35), 0 0 0 0 rgba(255,107,53,0.4);
  transition: all 0.3s cubic-bezier(0.25, 0.1, 0.25, 1);
  animation: cta-glow 2.5s ease-in-out infinite;
  -webkit-tap-highlight-color: transparent;
  position: relative;
  overflow: hidden;
}
@keyframes cta-glow {
  0%, 100% { box-shadow: 0 8px 32px rgba(255,107,53,0.35), 0 0 0 0 rgba(255,107,53,0.4); }
  50% { box-shadow: 0 12px 40px rgba(255,107,53,0.5), 0 0 20px 4px rgba(255,107,53,0.25); }
}
.cta::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 100px;
  background: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, transparent 50%);
  pointer-events: none;
}
.cta:active {
  transform: scale(0.95);
  box-shadow: 0 4px 16px rgba(255,107,53,0.2);
  animation: none;
}

.cta--secondary {
  background: var(--bg-card);
  border: 1px solid rgba(255,255,255,0.1);
  color: var(--text-primary);
  box-shadow: none;
  animation: none;
  font-size: 16px;
  font-weight: 600;
}
.cta--secondary::after { display: none; }
.cta--secondary:active {
  background: var(--bg-card-hover);
}

/* History */
.history {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 10px;
  min-height: 20px;
  flex-wrap: wrap;
  justify-content: center;
}
.history__label {
  font-size: 11px;
  color: var(--text-tertiary);
  margin-right: 4px;
  letter-spacing: 0.05em;
}
.history__dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--accent);
  opacity: 0.4;
  animation: dot-in 0.4s cubic-bezier(0.22, 0.61, 0.36, 1) both;
}
@keyframes dot-in {
  from { transform: scale(0); opacity: 0; }
  to { transform: scale(1); opacity: 0.4; }
}

/* Modal */
.modal-overlay {
  position: fixed;
  inset: 0;
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  background: rgba(0,0,0,0.5);
  display: flex;
  align-items: flex-end;
  justify-content: center;
  z-index: 100;
  padding: 20px;
  padding-bottom: max(34px, env(safe-area-inset-bottom, 20px));
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}
.modal-overlay--show { opacity: 1; pointer-events: auto; }
.modal {
  width: 100%;
  max-width: 374px;
  background: #1a1a2e;
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--radius-xl);
  padding: 28px 24px 24px;
  box-shadow: 0 24px 60px rgba(0,0,0,0.5);
  transform: translateY(20px);
  transition: transform 0.35s cubic-bezier(0.22, 0.61, 0.36, 1);
}
.modal-overlay--show .modal { transform: translateY(0); }
.modal__title {
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 18px;
  text-align: center;
}
.modal__input {
  width: 100%;
  height: 48px;
  border-radius: var(--radius-sm);
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.04);
  padding: 0 16px;
  font-size: 16px;
  font-family: var(--font-body);
  color: var(--text-primary);
  outline: none;
  transition: border-color 0.2s;
  margin-bottom: 8px;
}
.modal__input:focus { border-color: var(--accent); background: rgba(255,255,255,0.06); }
.modal__hint { font-size: 11px; color: var(--text-tertiary); margin-bottom: 20px; padding-left: 4px; }
.modal__actions { display: flex; gap: 10px; }
.modal__btn {
  flex: 1; height: 46px; border-radius: 100px; border: none;
  font-size: 16px; font-weight: 600; font-family: var(--font-body);
  cursor: pointer; transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.modal__btn--cancel { background: rgba(255,255,255,0.06); color: var(--text-secondary); }
.modal__btn--confirm { background: var(--accent); color: #fff; }
.modal__btn:active { transform: scale(0.96); }

/* Toast */
.toast {
  position: fixed;
  top: max(60px, env(safe-area-inset-top, 20px));
  left: 50%;
  transform: translateX(-50%) translateY(-120px);
  background: rgba(30,30,50,0.95);
  border: 1px solid rgba(255,255,255,0.1);
  color: #fff;
  font-size: 13px;
  font-weight: 500;
  padding: 10px 22px;
  border-radius: 100px;
  z-index: 200;
  pointer-events: none;
  transition: transform 0.35s cubic-bezier(0.22, 0.61, 0.36, 1);
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}
.toast--show { transform: translateX(-50%) translateY(0); }

/* Screen shake on SSR */
@keyframes screen-shake {
  0%, 100% { transform: translate(0); }
  10% { transform: translate(-4px, 2px); }
  20% { transform: translate(4px, -2px); }
  30% { transform: translate(-2px, -4px); }
  40% { transform: translate(2px, 4px); }
  50% { transform: translate(-4px, 0); }
  60% { transform: translate(4px, 0); }
  70% { transform: translate(0, -2px); }
  80% { transform: translate(0, 2px); }
  90% { transform: translate(-2px, 0); }
}
.phone--shake { animation: screen-shake 0.5s ease-out; }

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
}
</style>

  // Rarity system
  const RARITY_WEIGHTS = [
    { tier: 'SSR', weight: 2, label: '传说', color: '#f0c060' },
    { tier: 'SR', weight: 8, label: '稀有', color: '#b57bee' },
    { tier: 'R', weight: 20, label: '精品', color: '#5b9cf5' },
    { tier: 'N', weight: 70, label: '普通', color: '#5e5b78' },
  ];

  function rollRarity() {
    const total = RARITY_WEIGHTS.reduce((s, r) => s + r.weight, 0);
    let r = Math.random() * total;
    for (const item of RARITY_WEIGHTS) {
      r -= item.weight;
      if (r <= 0) return item;
    }
    return RARITY_WEIGHTS[3];
  }

  function getEmoji(name) {
    for (const [key, emoji] of Object.entries(CATEGORY_EMOJI)) {
      if (name.includes(key)) return emoji;
    }
    return '\uD83C\uDF7D\uFE0F';
  }

  // Storage
  function load() {
    try {
      const raw = localStorage.getItem('eat-today-dishes');
      if (raw) { dishes = JSON.parse(raw); if (!Array.isArray(dishes) || dishes.length === 0) throw new Error('empty'); }
      else dishes = Object.values(DEFAULT_CATEGORIES).flat();
    } catch { dishes = Object.values(DEFAULT_CATEGORIES).flat(); }
    try { const rawH = localStorage.getItem('eat-today-history'); if (rawH) history = JSON.parse(rawH); } catch { history = []; }
    try { const rawF = localStorage.getItem('eat-today-favs'); if (rawF) favDishes = new Set(JSON.parse(rawF)); } catch { favDishes = new Set(); }
    try { const rawH2 = localStorage.getItem('eat-today-hidden'); if (rawH2) hiddenDishes = new Set(JSON.parse(rawH2)); } catch { hiddenDishes = new Set(); }
  }

  function save() {
    try { localStorage.setItem('eat-today-dishes', JSON.stringify(dishes)); } catch {}
    try { localStorage.setItem('eat-today-history', JSON.stringify(history)); } catch {}
    try { localStorage.setItem('eat-today-favs', JSON.stringify([...favDishes])); } catch {}
    try { localStorage.setItem('eat-today-hidden', JSON.stringify([...hiddenDishes])); } catch {}
  }

  function getFilteredDishes() {
    if (activeFilter === 'reset') return dishes;
    return dishes.filter(d => DISH_CATEGORY[d] === activeFilter);
  }

  // Spark burst effect
  function spawnSparks() {
    const colors = ['#f0c060', '#ff6b35', '#b57bee', '#5b9cf5', '#4ecdc4', '#fff'];
    sparkBurst.innerHTML = '';
    for (let i = 0; i < 18; i++) {
      const particle = document.createElement('div');
      particle.className = 'spark-particle';
      const angle = (Math.PI * 2 * i) / 18 + (Math.random() - 0.5) * 0.3;
      const dist = 60 + Math.random() * 80;
      const dx = Math.cos(angle) * dist;
      const dy = Math.sin(angle) * dist;
      particle.style.cssText = `
        left: 50%; top: 50%;
        width: ${2 + Math.random() * 5}px;
        height: ${2 + Math.random() * 5}px;
        background: ${colors[Math.floor(Math.random() * colors.length)]};
        --dx: ${dx}px; --dy: ${dy}px;
        animation-delay: ${Math.random() * 0.15}s;
        box-shadow: 0 0 6px currentColor;
      `;
      sparkBurst.appendChild(particle);
    }
    setTimeout(() => { sparkBurst.innerHTML = ''; }, 1000);
  }

  // Screen shake
  function screenShake() {
    appEl.classList.add('phone--shake');
    setTimeout(() => appEl.classList.remove('phone--shake'), 500);
  }

  // Render
  function renderTags(highlightName) {
    tagCloud.innerHTML = '';
    dishes.forEach((name) => {
      const tag = document.createElement('span');
      tag.className = 'tag';
      if (highlightName && name === highlightName) tag.classList.add('tag--highlight');
      if (favDishes.has(name)) tag.classList.add('tag--fav');
      if (hiddenDishes.has(name)) tag.classList.add('tag--hidden');

      const emojiSpan = document.createElement('span');
      emojiSpan.className = 'tag__emoji';
      emojiSpan.textContent = getEmoji(name);
      const textNode = document.createTextNode(name);

      const favBtn = document.createElement('button');
      favBtn.className = 'tag__fav' + (favDishes.has(name) ? ' tag__fav--active' : '');
      favBtn.innerHTML = '&#9733;';
      favBtn.title = '收藏';
      favBtn.addEventListener('click', (e) => { e.stopPropagation(); toggleFav(name); });

      const hideBtn = document.createElement('button');
      hideBtn.className = 'tag__hide' + (hiddenDishes.has(name) ? ' tag__hide--active' : '');
      hideBtn.innerHTML = '&#9679;';
      hideBtn.title = '不感兴趣';
      hideBtn.addEventListener('click', (e) => { e.stopPropagation(); toggleHide(name); });

      const removeBtn = document.createElement('button');
      removeBtn.className = 'tag__remove';
      removeBtn.innerHTML = '&#x2715;';
      removeBtn.title = '删除';
      removeBtn.addEventListener('click', (e) => { e.stopPropagation(); removeDish(name); });

      tag.appendChild(emojiSpan);
      tag.appendChild(textNode);
      tag.appendChild(favBtn);
      tag.appendChild(hideBtn);
      tag.appendChild(removeBtn);
      tagCloud.appendChild(tag);
    });
    dishCount.textContent = dishes.length + ' \u9053';
  }

  function renderHistory() {
    historyEl.querySelectorAll('.history__dot').forEach(el => el.remove());

  function setCardRarity(rarity) {
    // Remove all rarity classes
    resultCard.classList.remove('result__card--N', 'result__card--R', 'result__card--SR', 'result__card--SSR');
    resultCard.classList.add('result__card--' + rarity.tier);
    resultRarity.className = 'result__rarity result__rarity--' + rarity.tier;
    resultRarity.textContent = rarity.tier + ' · ' + rarity.label;
    rarityGlow.className = 'rarity-glow rarity-glow--' + rarity.tier;

  function showResult(name, rarity, animate) {
    const emoji = getEmoji(name);
    const desc = getDesc(name);
    placeholder.style.display = 'none';
    resultEmoji.style.display = '';
    resultName.style.display = '';
    resultDesc.style.display = '';
    resultImageWrap.style.display = '';
    comboResult.style.display = 'none';
    resultEmoji.textContent = emoji;
    resultName.textContent = name;
    resultDesc.textContent = desc;
    setCardRarity(rarity);
    // Set card background image by category
    const cat = DISH_CATEGORY[name];
    if (resultBgImg) {
      resultBgImg.src = cat ? 'images/card-'+cat+'.png' : '';
      resultBgImg.style.display = cat ? '' : 'none';
    }

    if (animate) {
      resultCard.classList.remove('result__card--rolling', 'result__card--reveal');
      void resultCard.offsetWidth;
      resultCard.classList.add('result__card--reveal');
      rarityGlow.classList.add('rarity-glow--show');
      spawnSparks();
      if (rarity.tier === 'SSR') screenShake();
      setTimeout(() => rarityGlow.classList.remove('rarity-glow--show'), 1500);
    }
  }

    placeholder.style.display = 'none';

    const comboCat = DISH_CATEGORY[mainItem.name];
    if (resultBgImg) {
      resultBgImg.src = comboCat ? 'images/card-'+comboCat+'.png' : '';

    rarityGlow.classList.remove('rarity-glow--show');
    if (animate) {
      void resultCard.offsetWidth;
      resultCard.classList.add('result__card--reveal');

    const colorMap = {'主食': 'combo-item--main', '配菜': 'combo-item--side', '饮品': 'combo-item--drink'};
    comboResult.innerHTML = items.map((item) => {

  // Actions
  function toggleSection() { sectionOpen = !sectionOpen; sectionEl.classList.toggle('section--open', sectionOpen); }
  function toggleFav(name) { if (favDishes.has(name)) { favDishes.delete(name); } else { favDishes.add(name); } save(); renderTags(); }
  function toggleHide(name) { if (hiddenDishes.has(name)) { hiddenDishes.delete(name); } else { hiddenDishes.add(name); } save(); renderTags(); }

  function weightedPick(pool) {
    if (pool.length === 0) return null;
    const weights = pool.map(d => hiddenDishes.has(d) ? 1 : 5);
    const total = weights.reduce((s, w) => s + w, 0);
    let r = Math.random() * total;
    for (let i = 0; i < pool.length; i++) {
      r -= weights[i];
      if (r <= 0) return pool[i];
    }
    return pool[pool.length - 1];
  }

  function roll() {
    if (isRolling) return;
    const pool = getFilteredDishes();
    if (pool.length === 0) { showToast('\u5F53\u524D\u7B5B\u9009\u4E0B\u6CA1\u6709\u83DC\u54C1'); return; }
    isRolling = true;
    rollBtn.style.pointerEvents = 'none';
    comboBtn.style.pointerEvents = 'none';
    resultCard.classList.remove('result__card--reveal');
    resultCard.classList.add('result__card--rolling');
    rarityGlow.classList.remove('rarity-glow--show');
    renderTags(null);

    const rarity = rollRarity();
    const duration = 1200, interval = 60;
    let elapsed = 0, lastIdx = -1;
    const rollInterval = setInterval(() => {
      let idx;
      do { idx = Math.floor(Math.random() * pool.length); } while (idx === lastIdx && pool.length > 1);
      lastIdx = idx;
      showResult(pool[idx], { tier: 'N', label: '\u666E\u901A', color: '#5e5b78' }, false);
      elapsed += interval;
      if (elapsed >= duration) {
        clearInterval(rollInterval);
        const chosen = weightedPick(pool);
        resultCard.classList.remove('result__card--rolling');
        showResult(chosen, rarity, true);
        renderTags(chosen);
        history.unshift('[' + rarity.label + '] ' + chosen);
        if (history.length > HISTORY_MAX) history.length = HISTORY_MAX;
        renderHistory();
        save();
        isRolling = false;
        rollBtn.style.pointerEvents = '';
        comboBtn.style.pointerEvents = '';
      }
    }, interval);
  }

  function comboRoll() {
    if (isRolling) return;
    const fullPool = getFilteredDishes();
    const staples = fullPool.filter(d => STAPLE_CATS.has(DISH_CATEGORY[d]));
    const sides = fullPool.filter(d => SIDE_CATS.has(DISH_CATEGORY[d]));
    const drinks = fullPool.filter(d => DRINK_CATS.has(DISH_CATEGORY[d]));
    if (staples.length === 0) { showToast('\u5F53\u524D\u7B5B\u9009\u4E0B\u6CA1\u6709\u4E3B\u98DF\u7C7B\u83DC\u54C1'); return; }

    isRolling = true;
    rollBtn.style.pointerEvents = 'none';
    comboBtn.style.pointerEvents = 'none';
    resultCard.classList.remove('result__card--reveal');
    resultCard.classList.add('result__card--rolling');
    rarityGlow.classList.remove('rarity-glow--show');
    renderTags(null);

    const duration = 1200, interval = 60;
    let elapsed = 0, lastIdx = -1;
    const allPool = [...staples, ...sides, ...drinks];
    if (allPool.length === 0) { isRolling = false; return; }
    const rollInterval = setInterval(() => {
      let idx;
      do { idx = Math.floor(Math.random() * allPool.length); } while (idx === lastIdx && allPool.length > 1);
      lastIdx = idx;
      showResult(allPool[idx], { tier: 'N', label: '\u666E\u901A', color: '#5e5b78' }, false);
      elapsed += interval;
      if (elapsed >= duration) {
        clearInterval(rollInterval);
        resultCard.classList.remove('result__card--rolling');
        const main = weightedPick(staples);
        const side = sides.length > 0 ? weightedPick(sides) : null;
        const drink = drinks.length > 0 ? weightedPick(drinks) : null;
        const items = [{role:'\u4E3B\u98DF', name:main}];
        if (side) items.push({role:'\u914D\u83DC', name:side});
        if (drink) items.push({role:'\u996E\u54C1', name:drink});
        showComboResult(items, true);
        const names = [main, side, drink].filter(Boolean);
        history.unshift(names.join(' + '));
        if (history.length > HISTORY_MAX) history.length = HISTORY_MAX;
        renderHistory();
        save();
        isRolling = false;
        rollBtn.style.pointerEvents = '';
        comboBtn.style.pointerEvents = '';
      }
    }, interval);
  }

  function setFilter(key) {
    activeFilter = key;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('filter-btn--active', b.dataset.key === key));
    comboBtn.style.display = (key === 'reset') ? '' : 'none';
    renderTags(null);
  }

  function addDish(name) {
    const trimmed = name.trim();
    if (!trimmed) return;
    if (dishes.includes(trimmed)) { showToast('\u8FD9\u9053\u83DC\u5DF2\u7ECF\u5728\u83DC\u54C1\u6C60\u4E2D\u4E86'); return; }
    dishes.push(trimmed);
    save();
    renderTags();
  }

  function removeDish(name) {
    if (dishes.length <= 1) { showToast('\u81F3\u5C11\u4FDD\u7559\u4E00\u9053\u83DC\u54E6'); return; }
    dishes = dishes.filter(d => d !== name);
    favDishes.delete(name);
    hiddenDishes.delete(name);
    save();
    renderTags();
    showToast('\u5DF2\u5220\u9664\u300C' + name + '\u300D');
  }

  function openModal() { modalOverlay.classList.add('modal-overlay--show'); modalInput.value = ''; modalInput.focus(); }
  function closeModal() { modalOverlay.classList.remove('modal-overlay--show'); modalInput.blur(); }
  function confirmAdd() {
    const name = modalInput.value.trim();
    if (!name) { showToast('\u8BF7\u8F93\u5165\u83DC\u540D'); modalInput.focus(); return; }
    addDish(name);
    closeModal();
    showToast('\u5DF2\u6DFB\u52A0\u300C' + name + '\u300D');
  }

  let toastTimer;
  function showToast(msg) {
    if (toastTimer) clearTimeout(toastTimer);
    toast.textContent = msg;
    toast.classList.add('toast--show');
    toastTimer = setTimeout(() => { toast.classList.remove('toast--show'); }, 1800);
  }

  // Particle canvas
  const canvas = $('#particleCanvas');
  const ctx = canvas.getContext('2d');
  let particles = [];
  function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  function initParticles() {
    particles = [];
    for (let i = 0; i < 40; i++) {
      particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: 0.3 + Math.random() * 1.2,
        vx: (Math.random() - 0.5) * 0.3,
        vy: (Math.random() - 0.5) * 0.3,
        alpha: 0.15 + Math.random() * 0.35,
      });
    }
  }
  function animateParticles() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (const p of particles) {
      p.x += p.vx; p.y += p.vy;
      if (p.x < -10) p.x = canvas.width + 10;
      if (p.x > canvas.width + 10) p.x = -10;
      if (p.y < -10) p.y = canvas.height + 10;
      if (p.y > canvas.height + 10) p.y = -10;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(240,192,96,' + p.alpha + ')';
      ctx.fill();
    }
    requestAnimationFrame(animateParticles);
  }
  resizeCanvas();
  initParticles();
  animateParticles();
  window.addEventListener('resize', () => { resizeCanvas(); initParticles(); });

  // Events
  sectionHeader.addEventListener('click', (e) => { if (e.target.closest('#addBtn')) return; toggleSection(); });
  addBtn.addEventListener('click', (e) => { e.stopPropagation(); openModal(); });
  rollBtn.addEventListener('click', roll);
  comboBtn.addEventListener('click', comboRoll);
  modalCancel.addEventListener('click', closeModal);
  modalConfirm.addEventListener('click', confirmAdd);
  modalOverlay.addEventListener('click', (e) => { if (e.target === modalOverlay) closeModal(); });
  modalInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') confirmAdd(); if (e.key === 'Escape') closeModal(); });

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => setFilter(btn.dataset.key));
  });

  let touchStartY = 0;
  resultCard.addEventListener('touchstart', (e) => { touchStartY = e.touches[0].clientY; });
  resultCard.addEventListener('touchend', (e) => {
    const dy = e.changedTouches[0].clientY - touchStartY;
    if (dy > 60 && !isRolling) { resetResult(); renderTags(null); }
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === ' ' && document.activeElement === document.body) { e.preventDefault(); roll(); }
    if (e.key === '+' && document.activeElement === document.body && !modalOverlay.classList.contains('modal-overlay--show')) { e.preventDefault(); openModal(); }
  });

  load();
  renderTags();
  renderHistory();
  setFilter('reset');
})();
</script>
</body>
</html>
